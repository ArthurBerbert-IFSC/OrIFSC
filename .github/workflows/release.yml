name: Publicar plugin OrIFSC

# Dispara ao empurrar uma tag de versao no formato X.Y.Z, por exemplo:
#   git tag 0.1.6
#   git push origin 0.1.6
on:
  push:
    tags:
      - "*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # permite anexar o .zip ao GitHub Release da tag
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # qgis-plugin-ci precisa do historico e das tags

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Instalar qgis-plugin-ci
        run: pip install qgis-plugin-ci

      # qgis-plugin-ci, quando recebe --github-token, exige que o GitHub Release
      # da tag ja exista (senao falha com GithubReleaseNotFound). O push de tag
      # sozinho nao cria Release, entao criamos aqui (idempotente).
      - name: Criar GitHub Release da tag (se ainda nao existir)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}"
          || gh release create "${{ github.ref_name }}" --repo "${{ github.repository }}"
          --title "${{ github.ref_name }}" --generate-notes

      - name: Empacotar e publicar no plugins.qgis.org
        run: >-
          qgis-plugin-ci release ${{ github.ref_name }}
          --qgis-token "${{ secrets.QGIS_TOKEN }}"
          --github-token "${{ secrets.GITHUB_TOKEN }}"
